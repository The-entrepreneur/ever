# ─────────────────────────────────────────────────────────────
# Docker Compose — Level 2 Growth
# Runs: n8n + bot-engine + Redis per client
# Usage: docker-compose -f clients/[slug]/docker-compose.yml up -d
# ─────────────────────────────────────────────────────────────

version: '3.8'

services:

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_${HOTEL_SLUG}
    restart: unless-stopped
    ports:
      - '${N8N_PORT}:5678'
    env_file: .env
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${HOTEL_SLUG}.youragency.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_BASE_URL}
      - GENERIC_TIMEZONE=Europe/London
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data_${HOTEL_SLUG}:/home/node/.n8n
      - ./data/faq.json:/home/node/data/faq.json:ro
      - ./credentials:/home/node/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
      bot-engine:
        condition: service_started
    networks:
      - hotel_net_${HOTEL_SLUG}

  bot-engine:
    build:
      context: ../../base/bot-engine
      dockerfile: Dockerfile
    image: hotel-bot-engine:latest
    container_name: bot_${HOTEL_SLUG}
    restart: unless-stopped
    ports:
      - '${BOT_ENGINE_PORT}:3001'
    env_file: .env
    volumes:
      - ./data/rooms.json:/app/data/rooms.json:ro
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
      pms-api:
        condition: service_healthy
    networks:
      - hotel_net_${HOTEL_SLUG}

  pms-api:
    build:
      context: ../../base/pms-api
      dockerfile: Dockerfile
    image: hotel-pms-api:latest
    container_name: pms_${HOTEL_SLUG}
    restart: unless-stopped
    env_file: .env
    environment:
      - PMS_DATABASE_URL=${PMS_DATABASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - HOTEL_NAME=${HOTEL_NAME}
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL}
    volumes:
      - ./data/rooms.json:/app/data/rooms.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hotel_net_${HOTEL_SLUG}

  redis:
    image: redis:7-alpine
    container_name: redis_${HOTEL_SLUG}
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_${HOTEL_SLUG}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_net_${HOTEL_SLUG}

volumes:
  n8n_data_${HOTEL_SLUG}:
  redis_data_${HOTEL_SLUG}:

networks:
  hotel_net_${HOTEL_SLUG}:
    driver: bridge
